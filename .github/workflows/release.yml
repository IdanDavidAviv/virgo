name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Package VSIX
        run: npx vsce package --allow-all-proposed-apis

      - name: Extract version from tag
        id: meta
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "vsix=virgo-${VERSION}.vsix" >> $GITHUB_OUTPUT

      - name: Parse CHANGELOG for this version
        run: node scripts/parse_changelog.js ${{ steps.meta.outputs.version }} > release_notes.md

      - name: Verify VSIX artifact
        run: |
          if [ ! -f "${{ steps.meta.outputs.vsix }}" ]; then
            echo "❌ VSIX not found: ${{ steps.meta.outputs.vsix }}"
            exit 1
          fi
          SIZE=$(du -h "${{ steps.meta.outputs.vsix }}" | cut -f1)
          echo "✅ VSIX ready: ${{ steps.meta.outputs.vsix }} ($SIZE)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "${{ steps.meta.outputs.vsix }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release_notes.md
