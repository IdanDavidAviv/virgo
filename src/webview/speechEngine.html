<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div class="main-content">
    <div class="card context-card">
        <!-- TOP SLOT: Active Selection (Passive) -->
        <div id="active-selection" class="context-slot selection">
            <div class="slot-header">
                <span class="slot-label">FOCUSED FILE</span>
                <div class="mode-toggle-group">
                    <button id="btn-refresh-snippets" class="btn-refresh-snippets" title="Refresh snippet history" disabled>↻</button>
                    <button id="mode-file" class="mode-pill active" title="Local File Mode">FILE</button>
                    <button id="mode-snippet" class="mode-pill" title="Antigravity Snippet Mode">SNIPPET</button>
                </div>
            </div>
            
            <!-- FILE MODE -->
            <div id="file-mode-container" class="doc-info-compact">
                <span id="active-icon">📄</span>
                <div class="doc-title-stack">
                    <span id="active-filename" class="filename">No Selection</span>
                    <span id="active-dir" class="directory"></span>
                </div>
            </div>

            <!-- SNIPPET MODE -->
            <div id="snippet-lookup-container" class="snippet-lookup" style="display: none;">
                <div class="snippet-placeholder">Loading snippets...</div>
            </div>
        </div>
        
        <!-- INTERACTION LAYER -->
        <div class="transfer-layer">
            <div class="transfer-line"></div>
            <button id="btn-load-file" class="btn-load-premium" title="Load active selection into reader">
                <span class="btn-icon">⚡</span> LOAD FILE
            </button>
        </div>

        <!-- BOTTOM SLOT: Reading Context (Active) -->
        <div id="reading-context" class="context-slot reader">
            <div class="slot-header">
                <span class="slot-label">LOADED FILE</span>
                <button id="btn-clear-reader" class="btn-clear-reader" title="Clear Reader Context">Clear</button>
            </div>
            <div class="doc-info-compact">
                <span id="reader-icon">📖</span>
                <div class="doc-title-stack">
                    <span id="reader-filename" class="filename">No File Loaded</span>
                    <span id="reader-dir" class="directory"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- AUDIO SETTINGS CARD REMOVED (Migrated to Footer Popover) -->

    <div class="card">
        <div class="header">
            <span>Chapters</span>
            <span id="sentence-progress" class="chapter-progress-label">—</span>
        </div>
        
        <div id="sentence-navigator" class="sentence-navigator">
            <div class="sentence-row prev" id="sentence-prev"></div>
            <div class="sentence-row current" id="sentence-current">
                <span class="sentence-placeholder">Ready to read...</span>
            </div>
            <div class="sentence-row next" id="sentence-next"></div>
        </div>

        <div class="controls-row">
            <button id="btn-autoplay" class="ctrl-btn toggle active" title="Auto-advance chapters" data-active="true">🔁
                Auto</button>
            <button id="btn-prev" class="ctrl-btn" title="Previous Chapter">⏮ Ch</button>
            <button id="btn-prev-sentence" class="ctrl-btn" title="Last Row (Previous Sentence)">◀ Row</button>
            <div class="play-pause-container" style="flex:2; display: flex;">
                <button id="btn-play" class="ctrl-btn primary" title="Play/Resume" style="width:100%">▶</button>
                <button id="btn-pause" class="ctrl-btn" title="Pause" style="display:none; width:100%">⏸</button>
            </div>
            <button id="btn-next-sentence" class="ctrl-btn" title="Next Row (Next Sentence)">Row ▶</button>
            <button id="btn-next" class="ctrl-btn" title="Next Chapter">⏭ Ch</button>
            <button id="btn-stop" class="ctrl-btn" title="Stop">⏹</button>
        </div>
        <div class="chapter-header">
            <span>CHAPTERS</span>
            <span id="chapter-progress" class="chapter-progress-label">0/0</span>
        </div>
        <div id="chapter-list" class="chapter-list">
            <div class="chapter-placeholder">Press Play to load chapters...</div>
        </div>
    </div>

        </div>
    <div class="footer">
        <div class="settings-anchor">
            <span id="audio-settings-pill" class="settings-pill" title="Audio Settings"></span>
            
            <div id="settings-popover" class="settings-popover">
                    <div class="popover-header">
                        <span class="popover-title">Audio Settings</span>
                        <div class="popover-header-actions">
                            <button id="btn-refresh-voices" class="settings-btn-icon btn-refresh" title="Re-scan Premium Voices">↻</button>
                            <button id="btn-close-popover" class="settings-btn-icon btn-close" title="Close Settings">×</button>
                        </div>
                    </div>

                <div class="setting-group-horizontal">
                    <div class="setting-item flex-1">
                        <div class="setting-label">
                            <span>Volume</span>
                            <span id="volume-val">50%</span>
                        </div>
                        <input type="range" id="volume-slider" min="0" max="100" value="50">
                    </div>

                    <div class="setting-item flex-1">
                        <div class="setting-label">
                            <span>Speed</span>
                            <span id="rate-val">1.0x</span>
                        </div>
                        <input type="range" id="rate-slider" min="0.5" max="2.0" value="1.0" step="0.05">
                    </div>
                </div>

                <div class="voice-selector-premium">
                    <input type="text" id="voice-search" placeholder="Search voices..." spellcheck="false" autocomplete="off">
                    <div id="voice-list-container" class="voice-list-container">
                        <div class="voice-placeholder">Detecting Native Voices...</div>
                    </div>
                    <select id="voice-select" style="display:none"></select>
                </div>
            </div>
        </div>

        <span id="cache-debug-tag" class="cache-debug">[ CACHE: 0/100 | 0.0 MB ]</span>
        <div class="footer-right">
            <span id="mcp-status-badge" class="mcp-badge red" title="Click to configure MCP">MCP</span>
            <a id="feedback-link" class="bmac-link" href="https://github.com/IdanDavidAviv/virgo/issues" target="_blank" title="Report a Bug / Feedback">🐞</a>
            <a id="bmac-link" class="bmac-link" href="https://buymeacoffee.com/idandavidaviv" target="_blank" title="Buy me a coffee ☕">☕</a>
            <span id="debug-mode-tag" class="debug-tag" style="display:none">DEBUG</span>
            <span id="status-dot" title="Engine Status" class="status-dot-mini"></span>
            <span class="version-tag">V${extensionVersion}</span>
        </div>
    </div>

        <audio id="neural-player" style="display:none"></audio>
        <div id="toast-container" class="toast-container"></div>

</body>

</html>
