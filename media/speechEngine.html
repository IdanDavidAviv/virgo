<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>${inlineStyle}</style>
</head>

<body>
    <div class="card">
        <div class="header">
            <div id="status-dot" title="Handshake Status" class="status-dot-mini"></div>
            <div id="doc-info" class="doc-info">
                <span id="doc-icon">📄</span>
                <div class="doc-title-container">
                    <span id="doc-dir" class="doc-dir"></span>
                    <span id="doc-filename" class="doc-filename">No File Selected</span>
                </div>
                <button id="btn-load-file" class="btn-load">Load File</button>
            </div>
        </div>
        <div id="wave-container" class="waveform">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>

    <div class="card">
        <div class="header">
            <span>Audio Settings</span> 
            <span id="settings-toggle" class="settings-toggle-btn">⚙</span>
        </div>
        <div id="settings-drawer" class="settings-drawer open">
            <div class="setting-item">
                <div class="setting-label">
                    <span>Voice Profile</span>
                </div>
                <div class="engine-toggle-group">
                    <button id="engine-local" class="toggle-pill active">Local</button>
                    <button id="engine-neural" class="toggle-pill">Neural</button>
                </div>
                <select id="voice-select">
                    <option>Detecting Native Voices...</option>
                </select>
            </div>

            <div class="setting-item">
                <div class="setting-label">
                    <span>Speed</span>
                    <span id="rate-val">1.0x</span>
                </div>
                <input type="range" id="rate-slider" min="-10" max="10" value="0" step="1">
            </div>

            <div class="setting-item">
                <div class="setting-label">
                    <span>Volume</span>
                    <span id="volume-val">4%</span>
                </div>
                <input type="range" id="volume-slider" min="0" max="100" value="4">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="header">
            <span>📑 Chapters</span>
            <span id="chapter-progress" class="chapter-progress-label">—</span>
        </div>
        <div class="controls-row">
            <button id="btn-prev" class="ctrl-btn" title="Previous Chapter">⏮</button>
            <div class="play-pause-container" style="flex:2; display: flex;">
                <button id="btn-play" class="ctrl-btn primary" title="Play/Resume" style="width:100%">▶</button>
                <button id="btn-pause" class="ctrl-btn" title="Pause" style="display:none; width:100%">⏸</button>
            </div>
            <button id="btn-next" class="ctrl-btn" title="Next Chapter">⏭</button>
            <button id="btn-stop" class="ctrl-btn" title="Stop">⏹</button>
        </div>
        <div class="controls-row mini">
            <button id="btn-follow" class="ctrl-btn toggle" title="Follow voice in editor" data-active="false">📍
                Follow</button>
            <button id="btn-autoplay" class="ctrl-btn toggle active" title="Auto-advance chapters" data-active="true">🔁
                Auto</button>
        </div>
        <div id="current-sentence" class="current-sentence">
            <span class="sentence-placeholder">Ready to read...</span>
        </div>
        <div id="chapter-list" class="chapter-list">
            <div class="chapter-placeholder">Press Play to load chapters...</div>
        </div>
    </div>

    <div class="footer">ENGINE: NATIVE | UI: HERMETIC V1</div>

    <audio id="neural-player" style="display:none"></audio>
    <script>${inlineScript}</script>
</body>

</html>
