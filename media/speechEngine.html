<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>${inlineStyle}</style>
</head>

<body>
    <div class="card context-card">
        <!-- TOP SLOT: Active Selection (Passive) -->
        <div id="active-selection" class="context-slot selection">
            <div class="slot-header">
                <span class="slot-label">SIDEBAR FOCUS</span>
                <span id="status-dot" title="Engine Status" class="status-dot-mini"></span>
            </div>
            <div class="doc-info-compact">
                <span id="active-icon">📄</span>
                <div class="doc-title-stack">
                    <span id="active-filename" class="filename">No Selection</span>
                    <span id="active-dir" class="directory"></span>
                </div>
            </div>
        </div>
        
        <!-- INTERACTION LAYER -->
        <div class="transfer-layer">
            <div class="transfer-line"></div>
            <button id="btn-load-file" class="btn-load-premium" title="Load active selection into reader">
                <span class="btn-icon">⚡</span> LOAD FILE
            </button>
        </div>

        <!-- BOTTOM SLOT: Reading Context (Active) -->
        <div id="reading-context" class="context-slot reader">
            <div class="slot-header">
                <span class="slot-label">READER CONTEXT</span>
            </div>
            <div class="doc-info-compact">
                <span id="reader-icon">📖</span>
                <div class="doc-title-stack">
                    <span id="reader-filename" class="filename">No File Loaded</span>
                    <span id="reader-dir" class="directory"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="header">
            <span>Audio Settings</span>
            <span id="settings-toggle" class="settings-toggle-btn">⚙</span>
        </div>
        <div id="settings-drawer" class="settings-drawer open">
            <div class="setting-item">
                <div class="setting-label">
                    <span>Voice Profile</span>
                </div>
                <div class="engine-toggle-group">
                    <button id="engine-local" class="toggle-pill active">Local</button>
                    <button id="engine-neural" class="toggle-pill">Neural</button>
                </div>
                <input type="text" id="voice-search" placeholder="Search voices..." spellcheck="false" autocomplete="off">
                <select id="voice-select">
                    <option>Detecting Native Voices...</option>
                </select>
            </div>

            <div class="setting-item">
                <div class="setting-label">
                    <span>Speed</span>
                    <span id="rate-val">1.0x</span>
                </div>
                <input type="range" id="rate-slider" min="-10" max="10" value="0" step="1">
            </div>

            <div class="setting-item">
                <div class="setting-label">
                    <span>Volume</span>
                    <span id="volume-val">4%</span>
                </div>
                <input type="range" id="volume-slider" min="0" max="100" value="4">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="header">
            <span>Chapters</span>
            <span id="chapter-progress" class="chapter-progress-label">—</span>
        </div>
        
        <div class="controls-row">
            <button id="btn-prev" class="ctrl-btn" title="Previous Chapter">⏮</button>
            <div class="play-pause-container" style="flex:2; display: flex;">
                <button id="btn-play" class="ctrl-btn primary" title="Play/Resume" style="width:100%">▶</button>
                <button id="btn-pause" class="ctrl-btn" title="Pause" style="display:none; width:100%">⏸</button>
            </div>
            <button id="btn-next" class="ctrl-btn" title="Next Chapter">⏭</button>
            <button id="btn-stop" class="ctrl-btn" title="Stop">⏹</button>
        </div>
        <div class="controls-row mini">
            <button id="btn-autoplay" class="ctrl-btn toggle active" title="Auto-advance chapters" data-active="true">🔁
                Auto</button>
        </div>
        <div id="sentence-navigator" class="sentence-navigator">
            <div class="sentence-row prev" id="sentence-prev"></div>
            <div class="sentence-row current" id="sentence-current">
                <span class="sentence-placeholder">Ready to read...</span>
            </div>
            <div class="sentence-row next" id="sentence-next"></div>
            <div class="sentence-controls">
                <button id="btn-prev-sentence" class="sentence-ctrl-btn" title="Previous Sentence">◀</button>
                <button id="btn-next-sentence" class="sentence-ctrl-btn" title="Next Sentence">▶</button>
            </div>
        </div>
        <div id="chapter-list" class="chapter-list">
            <div class="chapter-placeholder">Press Play to load chapters...</div>
        </div>
    </div>

        <div class="footer">
            <span id="cache-debug-tag" class="cache-debug">[ CACHE: 0/100 | 0.0 MB ]</span>
            <span id="engine-status-tag">NATIVE</span>
            <span>| V1.2.1-DEBUG</span>
        </div>

        <audio id="neural-player" style="display:none"></audio>
        <div id="toast-container" class="toast-container"></div>
    <script>${inlineScript}</script>
</body>

</html>
