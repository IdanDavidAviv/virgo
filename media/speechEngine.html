<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Antigravity Host Protocol: Allowing host-level service worker initialization -->
    <!-- Extreme CSP: Temporarily relaxed for Antigravity troubleshooting -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval';">
    <script>
        console.log('--- WEBVIEW PRE-BOOTSTRAP ALIVE ---');
    </script>
    <style>
        /* Visual Heartbeat: If you see a blue border, the HTML is alive */
        body {
            border: 4px inset #007acc !important;
            min-height: 100vh;
        }

        :root {
            --primary: #007acc;
            --accent: #2ecc71;
            --bg: #0c0c0c;
            --glass: rgba(30, 30, 30, 0.7);
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            background: var(--bg);
            color: #d1d1d1;

            body {
                font-family: var(--vscode-font-family);
                padding: 20px;
                color: var(--vscode-foreground);
                background-color: var(--vscode-sideBar-background);
                border: 2px solid #007acc;
                /* Diagnostic Border */
                min-height: 100vh;
                margin: 0;
                overflow-x: hidden;
                display: flex;
                flex-direction: column;
                gap: 15px;
                user-select: none;
            }

            .card {
                background: var(--glass);
                backdrop-filter: blur(10px);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 15px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            }

            .header {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 20px;
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 2px;
                color: var(--primary);
                justify-content: space-between;
                /* Keep original for other headers */
            }

            #status-dot {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background-color: #ff4444;
                /* Initial: Red */
                box-shadow: 0 0 5px #ff4444;
                transition: background-color 0.3s;
            }

            #status-dot.online {
                background-color: #44ff44;
                /* Success: Green */
                box-shadow: 0 0 5px #44ff44;
            }

            .status-dot {
                /* Original status dot for other uses */
                width: 6px;
                height: 6px;
                background: var(--accent);
                border-radius: 50%;
                box-shadow: 0 0 10px var(--accent);
                animation: pulse 2s infinite;
            }

            @keyframes pulse {
                0% {
                    opacity: 0.4;
                }

                50% {
                    opacity: 1;
                }

                100% {
                    opacity: 0.4;
                }
            }

            .waveform {
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 3px;
                margin: 10px 0;
            }

            .bar {
                width: 3px;
                height: 20%;
                background: var(--primary);
                border-radius: 5px;
                transition: height 0.2s ease;
            }

            .speaking .bar {
                animation: bounce 1s infinite;
            }

            @keyframes bounce {

                0%,
                100% {
                    height: 20%;
                }

                50% {
                    height: 100%;
                }
            }

            .bar:nth-child(2) {
                animation-delay: 0.1s;
            }

            .bar:nth-child(3) {
                animation-delay: 0.2s;
            }

            .bar:nth-child(4) {
                animation-delay: 0.3s;
            }

            .bar:nth-child(5) {
                animation-delay: 0.4s;
            }

            .text-preview {
                font-family: 'Consolas', monospace;
                font-size: 12px;
                line-height: 1.6;
                color: #888;
                max-height: 150px;
                overflow-y: auto;
                border-left: 2px solid var(--primary);
                padding-left: 10px;
            }

            .active-text {
                color: #fff;
                font-weight: bold;
            }

            select {
                width: 100%;
                background: #252526;
                color: #ccc;
                border: 1px solid #444;
                padding: 8px;
                border-radius: 6px;
                font-size: 12px;
                margin-top: 5px;
                outline: none;
            }

            .footer {
                font-size: 9px;
                color: #555;
                text-align: center;
            }
    </style>
</head>

<body>
    <div class="card">
        <div class="header">
            <div id="status-dot" title="Handshake Status"></div>
            <h1>Mission Control</h1>
        </div>
        <div id="wave-container" class="waveform">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>

    <div class="card">
        <div class="header">🎤 Voice Profile</div>
        <select id="voice-select">
            <option>Detecting Native Voices...</option>
        </select>
    </div>

    <div class="card">
        <div class="header">📜 Data Stream</div>
        <div id="text-display" class="text-preview">Waiting for playback...</div>
    </div>

    <div class="footer">ENGINE: NATIVE | UI: GLASSMorphism V2</div>

    <!-- Zero-Fetch Script: Inlined for Antigravity host stability -->
    <script>{ inlineScript }</script>
</body>
</html>
