<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>${inlineStyle}</style>
</head>

<body>
    <div class="card">
        <div class="header">
            <div id="status-dot" title="Handshake Status"></div>
            <h1>Mission Control</h1>
        </div>
        <div id="wave-container" class="waveform">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>

    <div class="card">
        <div class="header">
            <span><span class="reload-icon" onclick="window.location.reload()" title="Force Refresh">↻</span> Voice Profile</span>
        </div>
        <select id="voice-select">
            <option>Detecting Native Voices...</option>
        </select>
    </div>

    <div class="card">
        <div class="header">📜 Data Stream</div>
        <div id="text-display" class="text-preview">Waiting for playback...</div>
    </div>

    <div class="footer">ENGINE: NATIVE | UI: HERMETIC V1</div>

    <script>${inlineScript}</script>
</body>

</html>
