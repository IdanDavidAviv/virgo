<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>${inlineStyle}</style>
</head>

<body>
    <div class="card">
        <div class="header">
            <div id="status-dot" title="Handshake Status"></div>
            <h1>Mission Control</h1>
        </div>
        <div id="wave-container" class="waveform">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>

    <div class="card">
        <div class="header">
            <span><span class="reload-icon" onclick="window.location.reload()" title="Force Refresh">↻</span> Voice Profile</span>
        </div>
        <select id="voice-select">
            <option>Detecting Native Voices...</option>
        </select>
    </div>

    <div class="card">
        <div class="header">
            <span>📑 Chapters</span>
            <span id="chapter-progress" class="chapter-progress-label">—</span>
        </div>
        <div class="controls-row">
            <button id="btn-prev"     class="ctrl-btn" title="Previous Chapter">⏮</button>
            <button id="btn-follow"   class="ctrl-btn toggle" title="Follow voice in editor" data-active="false">📍</button>
            <button id="btn-autoplay" class="ctrl-btn toggle active" title="Auto-advance chapters" data-active="true">🔁</button>
            <button id="btn-next"     class="ctrl-btn" title="Next Chapter">⏭</button>
        </div>
        <div id="chapter-list" class="chapter-list">
            <div class="chapter-placeholder">Press Play to load chapters...</div>
        </div>
    </div>

    <div class="footer">ENGINE: NATIVE | UI: HERMETIC V1</div>

    <script>${inlineScript}</script>
</body>

</html>
